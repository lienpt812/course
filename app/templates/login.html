<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang nhap</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <main class="content">
        <h1>Dang nhap</h1>
        <p><a class="btn ghost" href="/">Trang chu</a></p>

        <form id="login-form" class="card form-grid" style="margin-top: 14px;">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>
            <label for="password">Mat khau</label>
            <input id="password" name="password" type="password" required>
            <button type="submit" class="btn primary">Dang nhap</button>
        </form>

        <pre id="result" class="card" style="margin-top: 14px;"></pre>
    </main>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            const res = await fetch('/api/v1/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        });
    </script>
</body>
</html>
